name: Docs Governance

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  commit-message:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate Commit Message Contains Chinese
        run: |
          python scripts/check_commit_message.py --message "$(git log -1 --pretty=%s)"

  docs-alignment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Docs Alignment Gate
        run: python scripts/check_docs_alignment.py
