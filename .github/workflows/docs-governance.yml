name: Docs Governance

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  docs-alignment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Docs Alignment Gate
        run: python scripts/check_docs_alignment.py
