repos:
  - repo: local
    hooks:
      - id: mobile-unit-tests
        name: Mobile Unit Tests
        description: 运行移动端全量单元测试确保无回归
        entry: bash -c 'cd mobile_app && npm test -- --silent'
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true
      - id: backend-unit-tests
        name: Backend Unit Tests
        description: 运行后端单元测试确保无回归
        entry: bash -c 'cd backend && python -m pytest tests/unit/ -v --tb=short'
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true
      - id: no-test-code-in-production
        name: Check no test code in production
        description: 检查生产代码中是否包含测试专用逻辑
        entry: python scripts/check_no_test_code.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true
      - id: docs-alignment-check
        name: Check docs alignment
        description: 检查代码变更是否同步更新相关文档
        entry: python scripts/check_docs_alignment.py
        language: system
        pass_filenames: false
        stages: [pre-commit]
        always_run: true
      - id: commit-message-must-be-chinese
        name: Commit Message Must Be Chinese
        description: 检查 git commit message 必须包含中文
        entry: python scripts/check_commit_message.py
        language: system
        stages: [commit-msg]
